name: Advanced Weekly Content Update

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  update-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Clean stale update files
        run: rm -f data/updates/scraped-prices.json data/updates/scrape-report.json

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape Real Prices
        timeout-minutes: 25
        run: node scripts/scrape-data.mjs

      - name: Generate date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Run Pipeline
        id: pipeline
        run: |
          node scripts/update-data.mjs > pipeline_report.txt
          echo "REPORT<<EOF" >> $GITHUB_OUTPUT
          cat pipeline_report.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "data: automated content & price refresh"
          title: "🚀 Content Update: ${{ steps.date.outputs.date }}"
          body: |
            ## Automated Validation Report

            ${{ steps.pipeline.outputs.REPORT }}

            ---
            *This PR was generated automatically. Human review is required before merging.*
          branch: automation/content-update
          labels: |
            data-update
            needs-review
